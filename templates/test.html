<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тренажёр таблицы умножения</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 20px;
        }
        .container {
            background: rgba(255,255,255,0.2);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }
        .example {
            font-size: 3em;
            margin: 30px;
            font-weight: bold;
        }
        input {
            padding: 15px;
            font-size: 1.5em;
            width: 200px;
            text-align: center;
            border: none;
            border-radius: 10px;
            margin: 10px;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2em;
            background: #ffd700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #ffed4a;
        }
        .result {
            font-size: 1.5em;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
        }
        .correct {
            background: rgba(76, 175, 80, 0.3);
        }
        .wrong {
            background: rgba(244, 67, 54, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 ТРЕНАЖЁР ТАБЛИЦЫ УМНОЖЕНИЯ</h1>

        <div class="example" id="example">2 × 2 = ?</div>

        <input type="number" id="answer" placeholder="Введите ответ">

        <div>
            <button onclick="checkAnswer()">✅ ПРОВЕРИТЬ</button>
            <button onclick="newExample()">🔄 НОВЫЙ ПРИМЕР</button>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        let a, b, correctAnswer;

        // Функция для создания нового примера
        function newExample() {
            a = Math.floor(Math.random() * 10) + 1;  // от 1 до 10
            b = Math.floor(Math.random() * 10) + 1;
            correctAnswer = a * b;

            document.getElementById('example').innerHTML = `${a} × ${b} = ?`;
            document.getElementById('answer').value = '';
            document.getElementById('result').innerHTML = '';
        }

        // Функция для проверки ответа
        function checkAnswer() {
            let userAnswer = document.getElementById('answer').value;

            if (!userAnswer) {
                alert('Введите ответ!');
                return;
            }

            let resultDiv = document.getElementById('result');

            if (parseInt(userAnswer) === correctAnswer) {
                resultDiv.innerHTML = `
                    <div style="color: #4CAF50; font-size: 2em;">✅ ПРАВИЛЬНО!</div>
                    <div>${a} × ${b} = ${correctAnswer}</div>
                    <div>Молодец! ✨</div>
                `;
                resultDiv.className = 'result correct';
            } else {
                resultDiv.innerHTML = `
                    <div style="color: #f44336; font-size: 2em;">❌ НЕПРАВИЛЬНО!</div>
                    <div>Твой ответ: ${userAnswer}</div>
                    <div>Правильный ответ: ${correctAnswer} (${a} × ${b})</div>
                    <div>Попробуй ещё! 💪</div>
                `;
                resultDiv.className = 'result wrong';
            }
        }
        newExample();
    </script>
</body>
</html>
